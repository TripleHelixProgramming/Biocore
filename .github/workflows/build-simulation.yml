name: Build (Simulation)

on:
  push:

jobs:
  build:
    name: Build (Simulation)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Grant execute permission
        run: chmod +x gradlew
      - name: Build simulation
        run: |
          setsid ./gradlew simulateJavaRelease &>/tmp/sim.log &
          GRADLE_PID=$!
          tail -f /tmp/sim.log | grep -m1 "Robot program startup complete"
          kill -- -$GRADLE_PID 2>/dev/null || true
          cat /tmp/sim.log
