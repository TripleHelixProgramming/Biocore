name: Build (Simulation)

on:
  push:

jobs:
  build:
    name: Build (Simulation)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Grant execute permission
        run: chmod +x gradlew
      - name: Build simulation
        run: ./gradlew simulateJavaRelease
